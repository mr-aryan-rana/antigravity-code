<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b1030"/>
      <stop offset="100%" stop-color="#0d0f14"/>
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d85ff"/>
      <stop offset="55%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#22d3c7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect x="16" y="16" width="480" height="480" rx="100" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- orbit ring: nods to "antigravity" -->
  <ellipse cx="256" cy="256" rx="176" ry="70" fill="none" stroke="url(#mark)" stroke-width="10" stroke-linecap="round" opacity="0.55" transform="rotate(-18 256 256)"/>

  <!-- code chevron mark: "<>" lifted upward -->
  <g fill="none" stroke="url(#mark)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 196 190 L 128 256 L 196 322"/>
    <path d="M 316 190 L 384 256 L 316 322"/>
  </g>
  <path d="M 288 172 L 224 340" fill="none" stroke="url(#mark)" stroke-width="26" stroke-linecap="round" opacity="0.9"/>

  <!-- ascension spark -->
  <circle cx="256" cy="120" r="16" fill="url(#mark)"/>
</svg>
